<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all GitHub repositories">
  <title>Repositories - Cardinal</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <script>
    (function() {
      const stored = localStorage.getItem('cardinal-theme');
      const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="page">
    <div data-component="header"></div>

    <main class="main">
      <div class="container">
        <section class="hero">
          <h1 class="hero__title">Repositories</h1>
          <p class="hero__description">Browse, search, and filter across all repositories.</p>
        </section>

        <section class="controls">
          <div class="controls__search">
            <div class="search-input">
              <span class="search-input__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input
                id="search-input"
                class="search-input__field"
                type="search"
                placeholder="Search repositories, topics, languages..."
                aria-label="Search repositories"
              >
            </div>
          </div>
          <div id="filter-buttons" class="controls__filters"></div>
        </section>

        <p id="result-count" class="result-count"></p>

        <div id="repo-grid" class="repo-grid"></div>
      </div>
    </main>

    <div data-component="footer"></div>
    <div data-component="modal"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/search.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await initializeComponents('repos');
      Modal.init();
      App.init();
    })();
  </script>
</body>
</html>
